<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 18px;
      background: #f4f6f8;
      color: #222;
      zoom: 1.4;
    }

    .box {
      background: #fff;
      padding: 24px;
      border-radius: 18px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.12);
    }

    h1 {
      font-size: 42px;
      margin: 0 0 24px;
      line-height: 1.3;
    }

    .radioLabel {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 22px;
      margin-bottom: 10px;
      font-size: 32px;
      font-weight: bold;
      border: 2px solid #ddd;
      border-radius: 14px;
      background: white;
      cursor: pointer;
      user-select: none;
    }

    .radioLabel:has(input:checked) {
      background: #e8f0fe;
      border-color: #1a73e8;
    }

    input[type="radio"] {
      transform: scale(2.5);
      margin-right: 12px;
    }

    #mealPurposeArea,
    #memoArea {
      display: none;
      margin-top: 18px;
    }

    .fieldTitle {
      font-size: 28px;
      font-weight: bold;
      margin: 18px 0 10px;
    }

    select,
    textarea {
      width: 100%;
      padding: 18px;
      font-size: 28px;
      box-sizing: border-box;
      border: 2px solid #ccc;
      border-radius: 12px;
      background: white;
    }

    textarea {
      height: 120px;
    }

    .hint {
      margin-top: 10px;
      font-size: 22px;
      color: #666;
      line-height: 1.5;
    }

    .cameraButton {
      display: block;
      width: 100%;
      box-sizing: border-box;
      margin-top: 22px;
      padding: 28px 16px;
      background: #34a853;
      color: #fff;
      text-align: center;
      font-size: 32px;
      font-weight: 800;
      border-radius: 14px;
    }

    #receiptImage {
      display: none;
    }

    #fileName {
      margin-top: 14px;
      font-size: 24px;
      color: #555;
      word-break: break-all;
      font-weight: bold;
    }

    button {
      width: 100%;
      margin-top: 22px;
      padding: 28px 16px;
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      background: #1a73e8;
      border: none;
      border-radius: 14px;
    }

    button:disabled {
      background: #cccccc;
      color: #666666;
    }

    #result {
      margin-top: 22px;
      padding: 18px;
      font-size: 28px;
      line-height: 1.7;
      white-space: pre-line;
      background: #f1f3f4;
      border-radius: 12px;
    }

    #confirmArea {
      display: none;
      margin-top: 22px;
      padding: 18px;
      background: #fff8e1;
      border: 2px solid #fbbc04;
      border-radius: 14px;
    }

    .confirmTitle {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .confirmGrid {
      display: grid;
      gap: 14px;
    }

    .confirmField label {
      display: block;
      font-size: 24px;
      font-weight: bold;
      margin-bottom: 6px;
    }

    .confirmField input,
    .confirmField select,
    .confirmField textarea {
      font-size: 26px;
      padding: 14px;
    }

    .saveNotice {
      margin-top: 16px;
      font-size: 24px;
      line-height: 1.5;
      color: #5f4500;
      font-weight: bold;
    }

    .submitButton {
      background: #34a853;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>CS+ 経費領収書アップロード</h1>

    <label class="radioLabel">
      <input type="radio" name="category" value="駐車場・交通費" onchange="toggleInputs()">
      🚗 駐車場・交通費
    </label>

    <label class="radioLabel">
      <input type="radio" name="category" value="飲食費・会食" onchange="toggleInputs()">
      🍺 飲食費・会食
    </label>

    <label class="radioLabel">
      <input type="radio" name="category" value="ガソリン" onchange="toggleInputs()">
      ⛽ ガソリン
    </label>

    <label class="radioLabel">
      <input type="radio" name="category" value="その他経費" onchange="toggleInputs()">
      🛒 その他経費
    </label>

    <div id="mealPurposeArea">
      <div class="fieldTitle">会合・目的</div>
      <select id="mealPurpose" onchange="toggleMealMemo(); updateSendButton();">
        <option value="">選択してください</option>
        <option value="鯱の会">鯱の会</option>
        <option value="Passion Leaders">Passion Leaders</option>
        <option value="同友会">同友会</option>
        <option value="青経塾">青経塾</option>
        <option value="取引先">取引先</option>
        <option value="その他">その他</option>
      </select>
      <div class="hint">会合名または目的を選択してください。</div>
    </div>

    <div id="memoArea">
      <div id="memoTitle" class="fieldTitle">メモ</div>
      <textarea id="memo" placeholder=""></textarea>
      <div id="memoHint" class="hint"></div>
    </div>

    <label for="receiptImage" class="cameraButton">
      📷 領収書を撮影する
    </label>

    <input
      id="receiptImage"
      type="file"
      accept="image/*"
      capture="environment"
      onchange="showFileName(); analyzeReceipt();"
    >

    <div id="fileName">まだ撮影されていません</div>

    <button id="sendButton" onclick="analyzeReceipt()" disabled>
      解析する
    </button>

    <div id="confirmArea">
      <div class="confirmTitle">送信前確認</div>
      <div class="confirmGrid">
        <div class="confirmField"><label for="confirmDate">取引日</label><input id="confirmDate" type="date"></div>
        <div class="confirmField"><label for="confirmVendor">店舗名・取引先</label><input id="confirmVendor" type="text"></div>
        <div class="confirmField"><label for="confirmAmount">金額（税込）</label><input id="confirmAmount" type="number" inputmode="numeric"></div>
        <div class="confirmField"><label for="confirmInputCategory">選択した経費区分</label><input id="confirmInputCategory" type="text" readonly></div>
        <div class="confirmField"><label for="confirmCategory">Gemini判定カテゴリ</label><input id="confirmCategory" type="text"></div>
        <div class="confirmField">
          <label for="confirmPaymentMethod">支払方法</label>
          <select id="confirmPaymentMethod">
            <option value="現金">現金</option>
            <option value="クレジット">クレジット</option>
            <option value="電子マネー">電子マネー</option>
            <option value="QR決済">QR決済</option>
            <option value="不明">不明</option>
          </select>
        </div>
        <div class="confirmField"><label for="confirmInvoiceNumber">登録番号</label><input id="confirmInvoiceNumber" type="text" placeholder="T1234567890123"></div>
        <div class="confirmField"><label for="confirmInvoiceJudgement">インボイス判定</label><input id="confirmInvoiceJudgement" type="text"></div>
        <div class="confirmField"><label for="confirmTaxRate">税率</label><input id="confirmTaxRate" type="text"></div>
        <div class="confirmField"><label for="confirmTaxAmount">消費税額</label><input id="confirmTaxAmount" type="number" inputmode="numeric"></div>
        <div class="confirmField"><label for="confirmTaxNote">税率・消費税メモ</label><textarea id="confirmTaxNote"></textarea></div>
      </div>
      <div class="saveNotice">内容を確認・修正してから送信してください。送信ボタンを押すまでDrive保存とSheets登録は行いません。</div>
      <button id="submitButton" class="submitButton" onclick="submitConfirmedReceipt()">送信</button>
    </div>

    <div id="result"></div>
  </div>

  <script>
    function getSelectedCategory() {
      const selected = document.querySelector('input[name="category"]:checked');
      return selected ? selected.value : '';
    }

    function toggleInputs() {
      const category = getSelectedCategory();

      const mealPurposeArea = document.getElementById('mealPurposeArea');
      const mealPurpose = document.getElementById('mealPurpose');
      const memoArea = document.getElementById('memoArea');
      const memo = document.getElementById('memo');
      const memoTitle = document.getElementById('memoTitle');
      const memoHint = document.getElementById('memoHint');

      mealPurposeArea.style.display = 'none';
      memoArea.style.display = 'none';

      mealPurpose.value = '';
      memo.value = '';
      memoTitle.textContent = 'メモ';
      memo.placeholder = '';
      memoHint.textContent = '';

      if (category === '飲食費・会食') {
        mealPurposeArea.style.display = 'block';
      }

      if (category === 'その他経費') {
        memoArea.style.display = 'block';
        memoTitle.textContent = '購入内容';
        memo.placeholder = '例：USBハブ、LANケーブル、マウス、パソコン備品';
        memoHint.textContent = '購入内容が分かるように入力してください。';
      }

      updateSendButton();
    }

    function toggleMealMemo() {
      const purpose = document.getElementById('mealPurpose').value;
      const memoArea = document.getElementById('memoArea');
      const memo = document.getElementById('memo');
      const memoTitle = document.getElementById('memoTitle');
      const memoHint = document.getElementById('memoHint');

      memoArea.style.display = 'none';
      memo.value = '';
      memoTitle.textContent = 'メモ';
      memo.placeholder = '';
      memoHint.textContent = '';

      if (purpose === '取引先') {
        memoArea.style.display = 'block';
        memoTitle.textContent = '取引先名';
        memo.placeholder = '例：株式会社〇〇 山田社長';
        memoHint.textContent = '取引先名・相手の名前などを入力してください。';
      }

      if (purpose === 'その他') {
        memoArea.style.display = 'block';
        memoTitle.textContent = '内容';
        memo.placeholder = '例：会合名、相手先、目的など';
        memoHint.textContent = '内容が分かるように入力してください。';
      }

      updateSendButton();
    }

    function showFileName() {
      const fileInput = document.getElementById('receiptImage');
      const fileName = document.getElementById('fileName');

      fileName.textContent = fileInput.files.length
        ? '撮影済み：' + fileInput.files[0].name
        : 'まだ撮影されていません';
      document.getElementById('result').textContent = '';
      document.getElementById('confirmArea').style.display = 'none';
      document.getElementById('submitButton').disabled = true;

      updateSendButton();
    }

    function updateSendButton() {
      const category = getSelectedCategory();
      const imageSelected = document.getElementById('receiptImage').files.length > 0;
      const mealPurpose = document.getElementById('mealPurpose').value;
      const memo = document.getElementById('memo').value.trim();

      let ok = false;

      if (category === '駐車場・交通費' || category === 'ガソリン') {
        ok = category && imageSelected;
      }

      if (category === '飲食費・会食') {
        if (mealPurpose === '取引先' || mealPurpose === 'その他') {
          ok = imageSelected && mealPurpose && memo;
        } else {
          ok = imageSelected && mealPurpose;
        }
      }

      if (category === 'その他経費') {
        ok = imageSelected && memo;
      }

      document.getElementById('sendButton').disabled = !ok;
    }

    document.getElementById('memo').addEventListener('input', updateSendButton);

    function buildMemoText(category) {
      const mealPurpose = document.getElementById('mealPurpose').value;
      const memo = document.getElementById('memo').value.trim();

      if (category === '飲食費・会食') {
        if (mealPurpose === '取引先') return '取引先：' + memo;
        if (mealPurpose === 'その他') return 'その他：' + memo;
        return mealPurpose;
      }

      if (category === 'その他経費') return memo;

      return '';
    }

    function setAnalysisResult(res) {
      document.getElementById('confirmDate').value = res.date || '';
      document.getElementById('confirmVendor').value = res.vendor || '';
      document.getElementById('confirmAmount').value = res.amount || '';
      document.getElementById('confirmInputCategory').value = res.inputCategory || getSelectedCategory();
      document.getElementById('confirmCategory').value = res.category || '';
      document.getElementById('confirmPaymentMethod').value = res.paymentMethod || '現金';
      document.getElementById('confirmInvoiceNumber').value = res.invoiceNumber || '';
      document.getElementById('confirmInvoiceJudgement').value = res.invoiceJudgement || '';
      document.getElementById('confirmTaxRate').value = res.taxRate || '';
      document.getElementById('confirmTaxAmount').value = res.taxAmount || '';
      document.getElementById('confirmTaxNote').value = res.taxNote || res.invoiceNote || '';
      document.getElementById('confirmArea').style.display = 'block';
      document.getElementById('submitButton').disabled = false;
    }

    function getConfirmedValues() {
      return {
        date: document.getElementById('confirmDate').value,
        vendor: document.getElementById('confirmVendor').value.trim(),
        amount: document.getElementById('confirmAmount').value,
        category: document.getElementById('confirmCategory').value.trim(),
        paymentMethod: document.getElementById('confirmPaymentMethod').value,
        invoiceNumber: document.getElementById('confirmInvoiceNumber').value.trim(),
        invoiceJudgement: document.getElementById('confirmInvoiceJudgement').value.trim(),
        taxRate: document.getElementById('confirmTaxRate').value.trim(),
        taxAmount: document.getElementById('confirmTaxAmount').value,
        taxNote: document.getElementById('confirmTaxNote').value.trim()
      };
    }

    function validateConfirmedValues(values) {
      if (!values.date) return '取引日を入力してください。';
      if (!values.vendor) return '店舗名・取引先を入力してください。';
      if (!values.amount) return '金額を入力してください。';
      return '';
    }

    function submitConfirmedReceipt() {
      const category = getSelectedCategory();
      const fileInput = document.getElementById('receiptImage');
      const result = document.getElementById('result');
      const submitButton = document.getElementById('submitButton');
      const values = getConfirmedValues();
      const validationMessage = validateConfirmedValues(values);

      if (validationMessage) {
        result.textContent = validationMessage;
        return;
      }

      if (!category || !fileInput.files.length) {
        result.textContent = '経費区分と領収書画像を確認してください。';
        return;
      }

      const file = fileInput.files[0];
      const reader = new FileReader();

      submitButton.disabled = true;
      result.textContent = 'Drive保存とSheets登録を実行中です。しばらくお待ちください...';

      reader.onload = function(e) {
        const base64 = e.target.result.split(',')[1];

        google.script.run
          .withSuccessHandler(function(res) {
            if (res.success) {
              result.textContent = res.message || '登録が完了しました。';
              document.getElementById('confirmArea').style.display = 'none';
              document.getElementById('receiptImage').value = '';
              document.getElementById('fileName').textContent = 'まだ撮影されていません';
              updateSendButton();
            } else {
              submitButton.disabled = false;
              result.textContent = '登録に失敗しました。\n\n' + res.message;
            }
          })
          .withFailureHandler(function(err) {
            submitButton.disabled = false;
            result.textContent = 'エラー：' + err.message;
          })
          .submitConfirmedReceiptFromWebApp({
            categoryInput: category,
            memo: buildMemoText(category),
            imageBase64: base64,
            mimeType: file.type,
            confirmed: values
          });
      };

      reader.readAsDataURL(file);
    }

    function analyzeReceipt() {
      const category = getSelectedCategory();
      const fileInput = document.getElementById('receiptImage');
      const result = document.getElementById('result');
      const button = document.getElementById('sendButton');

      if (!category) {
        result.textContent = '経費区分を選択してから解析してください。';
        updateSendButton();
        return;
      }

      if (!fileInput.files.length) return;

      const file = fileInput.files[0];
      const reader = new FileReader();

      button.disabled = true;
      document.getElementById('confirmArea').style.display = 'none';
      document.getElementById('submitButton').disabled = true;
      result.textContent = 'Geminiで解析中です。しばらくお待ちください...';

      reader.onload = function(e) {
        const base64 = e.target.result.split(',')[1];

        google.script.run
          .withSuccessHandler(function(res) {
            button.disabled = false;

            if (res.success) {
              setAnalysisResult(res);
              result.textContent = '解析結果を確認し、必要に応じて編集してください。まだ保存はされていません。';
            } else {
              result.textContent = '読取に失敗しました。\n\n' + res.message;
            }
          })
          .withFailureHandler(function(err) {
            button.disabled = false;
            result.textContent = 'エラー：' + err.message;
          })
          .analyzeReceiptFromWebApp({
            categoryInput: category,
            imageBase64: base64,
            mimeType: file.type
          });
      };

      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
