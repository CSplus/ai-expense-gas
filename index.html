<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      margin: 0;
      padding: 18px;
      background: #f4f6f8;
      color: #222;
      zoom: 1.4;
    }

    .box {
      background: #fff;
      padding: 24px;
      border-radius: 18px;
      box-shadow: 0 3px 12px rgba(0,0,0,0.12);
    }

    h1 {
      font-size: 42px;
      margin: 0 0 24px;
      line-height: 1.3;
    }

    .radioLabel {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 22px;
      margin-bottom: 10px;
      font-size: 32px;
      font-weight: bold;
      border: 2px solid #ddd;
      border-radius: 14px;
      background: white;
      cursor: pointer;
      user-select: none;
    }

    .radioLabel:has(input:checked) {
      background: #e8f0fe;
      border-color: #1a73e8;
    }

    input[type="radio"] {
      transform: scale(2.5);
      margin-right: 12px;
    }

    #mealPurposeArea,
    #memoArea {
      display: none;
      margin-top: 18px;
    }

    .fieldTitle {
      font-size: 28px;
      font-weight: bold;
      margin: 18px 0 10px;
    }

    select,
    textarea {
      width: 100%;
      padding: 18px;
      font-size: 28px;
      box-sizing: border-box;
      border: 2px solid #ccc;
      border-radius: 12px;
      background: white;
    }

    textarea {
      height: 120px;
    }

    .hint {
      margin-top: 10px;
      font-size: 22px;
      color: #666;
      line-height: 1.5;
    }

    .cameraButton {
      display: block;
      width: 100%;
      box-sizing: border-box;
      margin-top: 22px;
      padding: 28px 16px;
      background: #34a853;
      color: #fff;
      text-align: center;
      font-size: 32px;
      font-weight: 800;
      border-radius: 14px;
    }

    #receiptImage {
      display: none;
    }

    #fileName {
      margin-top: 14px;
      font-size: 24px;
      color: #555;
      word-break: break-all;
      font-weight: bold;
    }

    button {
      width: 100%;
      margin-top: 22px;
      padding: 28px 16px;
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      background: #1a73e8;
      border: none;
      border-radius: 14px;
    }

    button:disabled {
      background: #cccccc;
      color: #666666;
    }

    #result {
      margin-top: 22px;
      padding: 18px;
      font-size: 28px;
      line-height: 1.7;
      white-space: pre-line;
      background: #f1f3f4;
      border-radius: 12px;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>CS+ 経費領収書アップロード</h1>

    <label class="radioLabel">
      <input type="radio" name="category" value="駐車場・交通費" onchange="toggleInputs()">
      🚗 駐車場・交通費
    </label>

    <label class="radioLabel">
      <input type="radio" name="category" value="飲食費・会食" onchange="toggleInputs()">
      🍺 飲食費・会食
    </label>

    <label class="radioLabel">
      <input type="radio" name="category" value="ガソリン" onchange="toggleInputs()">
      ⛽ ガソリン
    </label>

    <label class="radioLabel">
      <input type="radio" name="category" value="その他経費" onchange="toggleInputs()">
      🛒 その他経費
    </label>

    <div id="mealPurposeArea">
      <div class="fieldTitle">会合・目的</div>
      <select id="mealPurpose" onchange="toggleMealMemo(); updateSendButton();">
        <option value="">選択してください</option>
        <option value="鯱の会">鯱の会</option>
        <option value="Passion Leaders">Passion Leaders</option>
        <option value="同友会">同友会</option>
        <option value="青経塾">青経塾</option>
        <option value="取引先">取引先</option>
        <option value="その他">その他</option>
      </select>
      <div class="hint">会合名または目的を選択してください。</div>
    </div>

    <div id="memoArea">
      <div id="memoTitle" class="fieldTitle">メモ</div>
      <textarea id="memo" placeholder=""></textarea>
      <div id="memoHint" class="hint"></div>
    </div>

    <label for="receiptImage" class="cameraButton">
      📷 領収書を撮影する
    </label>

    <input
      id="receiptImage"
      type="file"
      accept="image/*"
      capture="environment"
      onchange="showFileName()"
    >

    <div id="fileName">まだ撮影されていません</div>

    <button id="sendButton" onclick="submitReceipt()" disabled>
      送信
    </button>

    <div id="result"></div>
  </div>

  <script>
    function getSelectedCategory() {
      const selected = document.querySelector('input[name="category"]:checked');
      return selected ? selected.value : '';
    }

    function toggleInputs() {
      const category = getSelectedCategory();

      const mealPurposeArea = document.getElementById('mealPurposeArea');
      const mealPurpose = document.getElementById('mealPurpose');
      const memoArea = document.getElementById('memoArea');
      const memo = document.getElementById('memo');
      const memoTitle = document.getElementById('memoTitle');
      const memoHint = document.getElementById('memoHint');

      mealPurposeArea.style.display = 'none';
      memoArea.style.display = 'none';

      mealPurpose.value = '';
      memo.value = '';
      memoTitle.textContent = 'メモ';
      memo.placeholder = '';
      memoHint.textContent = '';

      if (category === '飲食費・会食') {
        mealPurposeArea.style.display = 'block';
      }

      if (category === 'その他経費') {
        memoArea.style.display = 'block';
        memoTitle.textContent = '購入内容';
        memo.placeholder = '例：USBハブ、LANケーブル、マウス、パソコン備品';
        memoHint.textContent = '購入内容が分かるように入力してください。';
      }

      updateSendButton();
    }

    function toggleMealMemo() {
      const purpose = document.getElementById('mealPurpose').value;
      const memoArea = document.getElementById('memoArea');
      const memo = document.getElementById('memo');
      const memoTitle = document.getElementById('memoTitle');
      const memoHint = document.getElementById('memoHint');

      memoArea.style.display = 'none';
      memo.value = '';
      memoTitle.textContent = 'メモ';
      memo.placeholder = '';
      memoHint.textContent = '';

      if (purpose === '取引先') {
        memoArea.style.display = 'block';
        memoTitle.textContent = '取引先名';
        memo.placeholder = '例：株式会社〇〇 山田社長';
        memoHint.textContent = '取引先名・相手の名前などを入力してください。';
      }

      if (purpose === 'その他') {
        memoArea.style.display = 'block';
        memoTitle.textContent = '内容';
        memo.placeholder = '例：会合名、相手先、目的など';
        memoHint.textContent = '内容が分かるように入力してください。';
      }

      updateSendButton();
    }

    function showFileName() {
      const fileInput = document.getElementById('receiptImage');
      const fileName = document.getElementById('fileName');

      fileName.textContent = fileInput.files.length
        ? '撮影済み：' + fileInput.files[0].name
        : 'まだ撮影されていません';
      document.getElementById('result').textContent = '';

      updateSendButton();
    }

    function updateSendButton() {
      const category = getSelectedCategory();
      const imageSelected = document.getElementById('receiptImage').files.length > 0;
      const mealPurpose = document.getElementById('mealPurpose').value;
      const memo = document.getElementById('memo').value.trim();

      let ok = false;

      if (category === '駐車場・交通費' || category === 'ガソリン') {
        ok = category && imageSelected;
      }

      if (category === '飲食費・会食') {
        if (mealPurpose === '取引先' || mealPurpose === 'その他') {
          ok = imageSelected && mealPurpose && memo;
        } else {
          ok = imageSelected && mealPurpose;
        }
      }

      if (category === 'その他経費') {
        ok = imageSelected && memo;
      }

      document.getElementById('sendButton').disabled = !ok;
    }

    document.getElementById('memo').addEventListener('input', updateSendButton);

    function buildMemoText(category) {
      const mealPurpose = document.getElementById('mealPurpose').value;
      const memo = document.getElementById('memo').value.trim();

      if (category === '飲食費・会食') {
        if (mealPurpose === '取引先') return '取引先：' + memo;
        if (mealPurpose === 'その他') return 'その他：' + memo;
        return mealPurpose;
      }

      if (category === 'その他経費') return memo;

      return '';
    }

    function submitReceipt() {
      const category = getSelectedCategory();
      const memo = buildMemoText(category);
      const fileInput = document.getElementById('receiptImage');
      const result = document.getElementById('result');
      const button = document.getElementById('sendButton');

      if (!category) {
        alert('経費区分を選択してください。');
        return;
      }

      if (!fileInput.files.length) {
        alert('領収書を撮影してください。');
        return;
      }

      const file = fileInput.files[0];
      const reader = new FileReader();

      button.disabled = true;
      result.textContent = '送信中です。しばらくお待ちください...';

      reader.onload = function(e) {
        const base64 = e.target.result.split(',')[1];

        google.script.run
          .withSuccessHandler(function(res) {
            button.disabled = false;

            if (res.success) {
              result.textContent =
                '登録完了\n\n' +
                '取引日：' + res.date + '\n' +
                '店舗名：' + res.vendor + '\n' +
                '金額：' + res.amount + '円\n' +
                '勘定科目：' + res.category;

              document.getElementById('memo').value = '';
              document.getElementById('mealPurpose').value = '';
              document.getElementById('receiptImage').value = '';
              document.getElementById('fileName').textContent = 'まだ撮影されていません';
              toggleInputs();
              updateSendButton();
            } else {
              result.textContent =
                '登録しましたが、読取に失敗しました。\n\n' +
                res.message;
            }
          })
          .withFailureHandler(function(err) {
            button.disabled = false;
            result.textContent = 'エラー：' + err.message;
          })
          .uploadReceiptFromWebApp({
            categoryInput: category,
            memo: memo,
            imageBase64: base64,
            mimeType: file.type
          });
      };

      reader.readAsDataURL(file);
    }
  </script>
</body>
</html>
