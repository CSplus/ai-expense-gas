<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

  <style>
    :root {
      --primary: #2F80ED;
      --primary-dark: #2563EB;
      --accent: #60A5FA;
      --text: #1F2937;
      --muted: #6B7280;
      --line: #E5EAF2;
      --card: rgba(255, 255, 255, 0.94);
      --shadow: 0 22px 60px rgba(47, 128, 237, 0.14), 0 6px 20px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      background:
        radial-gradient(circle at 8% 14%, rgba(96, 165, 250, 0.28), transparent 28%),
        radial-gradient(circle at 92% 8%, rgba(47, 128, 237, 0.18), transparent 32%),
        linear-gradient(160deg, #F4F9FF 0%, #EAF4FF 48%, #FFFFFF 100%);
      overflow-x: hidden;
    }

    body::before,
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    body::before {
      background-image: radial-gradient(rgba(47, 128, 237, 0.18) 1.2px, transparent 1.2px);
      background-size: 14px 14px;
      mask-image: linear-gradient(130deg, #000 0 24%, transparent 48%);
    }

    body::after {
      background:
        repeating-radial-gradient(ellipse at 92% 12%, transparent 0 14px, rgba(96, 165, 250, 0.16) 15px 17px, transparent 18px 28px);
      mask-image: linear-gradient(180deg, #000 0 28%, transparent 58%);
    }

    .app-shell {
      position: relative;
      z-index: 1;
      width: min(100%, 500px);
      min-height: 100vh;
      margin: 0 auto;
      padding: 22px 16px 112px;
    }

    .app-header {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 44px;
      gap: 12px;
      align-items: center;
      padding: 8px 2px 18px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-mark {
      line-height: 0.9;
      letter-spacing: -0.08em;
    }

    .brand-main {
      display: block;
      font-size: clamp(36px, 9.5vw, 50px);
      font-weight: 950;
      background: linear-gradient(135deg, #2F80ED, #0F6AD9);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .brand-sub {
      display: block;
      margin-top: 6px;
      font-size: 14px;
      font-weight: 850;
      letter-spacing: -0.03em;
      color: #111827;
    }

    .header-copy { min-width: 0; }

    .header-copy h1 {
      margin: 0;
      font-size: clamp(23px, 5.7vw, 30px);
      line-height: 1.08;
      letter-spacing: -0.04em;
      font-weight: 950;
      white-space: nowrap;
    }

    .header-copy p {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.01em;
    }

    .help-button {
      width: 42px;
      height: 42px;
      display: grid;
      place-items: center;
      border: 2px solid var(--primary);
      border-radius: 50%;
      color: var(--primary);
      background: rgba(255, 255, 255, 0.72);
      font-size: 25px;
      font-weight: 800;
      box-shadow: 0 10px 22px rgba(47, 128, 237, 0.12);
    }

    .main-card {
      background: var(--card);
      border: 1px solid rgba(255, 255, 255, 0.9);
      padding: 26px 20px;
      border-radius: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 22px;
      font-size: 19px;
      font-weight: 950;
      letter-spacing: -0.03em;
    }

    .title-icon,
    .category-icon,
    .feature-icon,
    .security-icon {
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      border-radius: 999px;
      background: #EAF4FF;
      color: var(--primary);
    }

    .title-icon { width: 52px; height: 52px; }

    .category-list { display: grid; gap: 14px; }

    .category-card {
      position: relative;
      display: grid;
      grid-template-columns: 32px 76px 1fr 18px;
      gap: 14px;
      align-items: center;
      min-height: 102px;
      padding: 16px 18px;
      border: 1.5px solid var(--line);
      border-radius: 18px;
      background: #FFFFFF;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.07);
      cursor: pointer;
      user-select: none;
      transition: transform 0.15s ease, border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
    }

    .category-card:hover { transform: translateY(-1px); }
    .category-card:active { transform: scale(0.985); }

    .category-card.is-selected,
    .category-card:has(input:checked) {
      border-color: var(--primary);
      background: linear-gradient(135deg, #F0F7FF, #FFFFFF);
      box-shadow: 0 14px 30px rgba(47, 128, 237, 0.15);
    }

    .category-card input[type="radio"] {
      position: absolute;
      opacity: 0;
      pointer-events: none;
    }

    .radio-visual {
      width: 28px;
      height: 28px;
      border: 2.5px solid #9CA3AF;
      border-radius: 50%;
      display: grid;
      place-items: center;
      color: white;
      transition: all 0.15s ease;
    }

    .category-card.is-selected .radio-visual,
    .category-card:has(input:checked) .radio-visual {
      border-color: var(--primary);
      background: var(--primary);
    }

    .radio-visual svg { opacity: 0; transform: scale(0.7); transition: all 0.15s ease; }
    .category-card.is-selected .radio-visual svg,
    .category-card:has(input:checked) .radio-visual svg { opacity: 1; transform: scale(1); }

    .category-icon { width: 68px; height: 68px; }
    .category-icon.transport { background: #E0F0FF; color: #0B6FD3; }
    .category-icon.meal { background: #FFF2DA; color: #EA8A00; }
    .category-icon.fuel { background: #FFE6E9; color: #D13D45; }
    .category-icon.other { background: #DCFCEB; color: #10A66A; }

    .category-title { font-size: 21px; font-weight: 900; letter-spacing: -0.03em; }
    .chevron { color: #111827; opacity: 0.86; }
    .category-card.is-selected .chevron,
    .category-card:has(input:checked) .chevron { color: var(--primary); opacity: 1; }

    #mealPurposeArea,
    #memoArea { display: none; margin-top: 18px; }

    .fieldTitle { font-size: 15px; font-weight: 900; margin: 18px 0 8px; color: #374151; }

    select,
    textarea,
    .confirmField input,
    .confirmField select,
    .confirmField textarea {
      width: 100%;
      padding: 14px 15px;
      font-size: 16px;
      box-sizing: border-box;
      border: 1.5px solid #D7DEE9;
      border-radius: 14px;
      background: #fff;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }

    select:focus,
    textarea:focus,
    .confirmField input:focus,
    .confirmField select:focus,
    .confirmField textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(47, 128, 237, 0.12);
    }

    textarea { min-height: 110px; resize: vertical; }

    .hint { margin-top: 8px; font-size: 13px; color: var(--muted); line-height: 1.55; }

    .primary-action-button {
      display: grid;
      grid-template-columns: 54px 1fr;
      gap: 14px;
      align-items: center;
      width: 100%;
      margin-top: 24px;
      padding: 22px 22px;
      background: linear-gradient(135deg, #3B82F6, #2563EB);
      color: #fff;
      text-decoration: none;
      border-radius: 20px;
      box-shadow: 0 18px 34px rgba(37, 99, 235, 0.34);
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, filter 0.2s ease;
    }

    .primary-action-button:hover { filter: brightness(1.04); transform: translateY(-1px); }
    .primary-action-button:active { transform: scale(0.98); box-shadow: 0 10px 20px rgba(37, 99, 235, 0.26); }
    .action-title { display: block; font-size: 24px; font-weight: 950; letter-spacing: -0.04em; }
    .action-subtitle { display: block; margin-top: 5px; font-size: 15px; font-weight: 700; opacity: 0.9; }

    #receiptImage { display: none; }

    #fileName {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 999px;
      background: #F8FAFC;
      border: 1px solid #E2E8F0;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.35;
      word-break: break-all;
      font-weight: 850;
      text-align: center;
    }

    #fileName::before {
      content: "";
      width: 9px;
      height: 9px;
      border-radius: 50%;
      border: 2px solid currentColor;
      flex: 0 0 auto;
    }

    #fileName.is-captured {
      color: #047857;
      background: #ECFDF5;
      border-color: #A7F3D0;
    }

    #fileName.is-captured::before {
      content: "✓";
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      border: none;
      background: #10B981;
      color: #FFFFFF;
      font-size: 12px;
    }

    #fileName.is-analyzing {
      color: #1D4ED8;
      background: #EFF6FF;
      border-color: #BFDBFE;
    }

    #fileName.is-analyzing::before {
      border-color: rgba(47, 128, 237, 0.22);
      border-top-color: var(--primary);
      animation: spin 0.8s linear infinite;
    }

    #fileName.is-analyzed {
      color: #1E40AF;
      background: #EEF4FF;
      border-color: #BFDBFE;
    }

    #fileName.is-analyzed::before {
      content: "✓";
      width: 18px;
      height: 18px;
      display: grid;
      place-items: center;
      border: none;
      background: var(--primary);
      color: #FFFFFF;
      font-size: 12px;
    }

    .security-card {
      display: grid;
      grid-template-columns: 52px 1fr 16px;
      gap: 14px;
      align-items: center;
      margin-top: 22px;
      padding: 16px;
      border-radius: 18px;
      background: rgba(248, 250, 252, 0.92);
      border: 1px solid #E2E8F0;
      color: #1E5CA8;
    }

    .security-icon { width: 48px; height: 48px; background: #EEF4FF; }
    .security-title { display: block; font-size: 16px; font-weight: 950; color: #1F2937; }
    .security-text { display: block; margin-top: 5px; font-size: 13px; color: #475569; font-weight: 700; line-height: 1.45; }

    .loading-state {
      display: none;
      align-items: center;
      gap: 12px;
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 16px;
      background: #EFF6FF;
      color: #1D4ED8;
      font-weight: 850;
    }

    .loading-state.is-active { display: flex; }
    .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid rgba(47, 128, 237, 0.18);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #result {
      margin-top: 18px;
      padding: 14px 16px;
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-line;
      background: #F8FAFC;
      border: 1px solid #E2E8F0;
      border-radius: 14px;
      color: #334155;
    }

    #confirmArea {
      display: none;
      margin-top: 22px;
      padding: 18px;
      background: #FFFBEB;
      border: 1.5px solid #FCD34D;
      border-radius: 20px;
    }

    .confirmTitle { font-size: 22px; font-weight: 950; margin-bottom: 14px; }
    .confirmGrid { display: grid; gap: 13px; }
    .confirmField label { display: block; font-size: 13px; font-weight: 850; margin-bottom: 6px; color: #475569; }
    .saveNotice { margin-top: 16px; font-size: 13px; line-height: 1.55; color: #7C5200; font-weight: 800; }

    button {
      width: 100%;
      margin-top: 18px;
      padding: 17px 16px;
      font-size: 19px;
      font-weight: 950;
      color: #fff;
      background: linear-gradient(135deg, #22C55E, #16A34A);
      border: none;
      border-radius: 16px;
      box-shadow: 0 12px 24px rgba(22, 163, 74, 0.22);
    }

    button:disabled { background: #CBD5E1; color: #64748B; box-shadow: none; }

    .features-section { margin: 30px 0 22px; }
    .features-heading {
      display: flex;
      align-items: center;
      gap: 14px;
      color: var(--primary);
      font-size: 16px;
      font-weight: 950;
      justify-content: center;
      margin-bottom: 16px;
    }
    .features-heading::before,
    .features-heading::after { content: ""; height: 1px; flex: 1; background: #CFE3FA; }
    .features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }

    .feature-card {
      min-height: 136px;
      padding: 16px 10px;
      background: rgba(255,255,255,0.88);
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 10px 24px rgba(15, 23, 42, 0.06);
    }
    .feature-icon { width: 42px; height: 42px; margin: 0 auto 10px; }
    .feature-card:nth-child(1) .feature-icon { background: #EAF4FF; color: #2F80ED; }
    .feature-card:nth-child(2) .feature-icon { background: #DCFCEB; color: #16A34A; }
    .feature-card:nth-child(3) .feature-icon { background: #F1E8FF; color: #8B5CF6; }
    .feature-title { font-size: 13px; font-weight: 950; margin-bottom: 6px; }
    .feature-text { font-size: 11px; line-height: 1.55; color: #475569; font-weight: 650; }

    .bottom-nav {
      position: fixed;
      left: 50%;
      bottom: max(14px, env(safe-area-inset-bottom));
      transform: translateX(-50%);
      width: min(calc(100% - 32px), 468px);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      padding: 10px 14px;
      background: rgba(255, 255, 255, 0.94);
      border: 1px solid rgba(226, 232, 240, 0.9);
      border-radius: 28px;
      box-shadow: 0 18px 40px rgba(15, 23, 42, 0.16);
      backdrop-filter: blur(18px);
      z-index: 5;
    }

    .nav-item {
      display: grid;
      justify-items: center;
      gap: 4px;
      padding: 7px 4px;
      border-radius: 18px;
      color: #111827;
      font-size: 12px;
      font-weight: 800;
    }
    .nav-item.is-active { color: var(--primary); }
    .nav-icon { display: grid; place-items: center; width: 40px; height: 40px; border-radius: 50%; }
    .nav-item.is-active .nav-icon { background: #DBEDFF; }

    @media (max-width: 390px) {
      .app-shell { padding-inline: 14px; }
      .brand-row { gap: 10px; }
      .brand-main { font-size: 34px; }
      .brand-sub { font-size: 12px; }
      .header-copy { min-width: 0; }

    .header-copy h1 { font-size: 22px; }
      .header-copy p { font-size: 13px; }
      .category-card { grid-template-columns: 28px 60px 1fr 16px; padding-inline: 14px; }
      .category-icon { width: 58px; height: 58px; }
      .category-title { font-size: 19px; }
      .features-grid { gap: 8px; }
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="brand-row">
        <div class="brand-mark" aria-label="CS+ Expense AI">
          <span class="brand-main">CS+</span>
          <span class="brand-sub">Expense AI</span>
        </div>
        <div class="header-copy">
          <h1>経費領収書アップロード</h1>
          <p>AIが領収書を自動解析・自動仕訳</p>
        </div>
      </div>
      <div class="help-button" aria-label="ヘルプ">?</div>
    </header>

    <main class="main-card">
      <div class="section-title">
        <span class="title-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M8 7.5 9.4 5h5.2L16 7.5h2.5A2.5 2.5 0 0 1 21 10v6.5a2.5 2.5 0 0 1-2.5 2.5h-13A2.5 2.5 0 0 1 3 16.5V10a2.5 2.5 0 0 1 2.5-2.5H8Z" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="13" r="3.2" stroke="currentColor" stroke-width="1.8"/><path d="M18 6l.5-1 .5 1 1 .5-1 .5-.5 1-.5-1-1-.5 1-.5Z" fill="currentColor"/></svg></span>
        <span>該当する経費の種類を選択してください</span>
      </div>

      <div class="category-list">
        <label class="category-card">
          <input type="radio" name="category" value="駐車場・交通費" onchange="toggleInputs(); maybeAnalyzeReceipt();">
          <span class="radio-visual"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m5 12.5 4.2 4.2L19.5 6.5" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span class="category-icon transport"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m5 12 1.5-4.2A2 2 0 0 1 8.4 6.5h7.2a2 2 0 0 1 1.9 1.3L19 12" stroke="currentColor" stroke-width="1.8"/><path d="M4 12h16v5H4v-5Z" fill="currentColor" opacity=".16" stroke="currentColor" stroke-width="1.8"/><circle cx="7.5" cy="17" r="1.5" fill="currentColor"/><circle cx="16.5" cy="17" r="1.5" fill="currentColor"/></svg></span>
          <span class="category-title">駐車場・交通費</span>
          <span class="chevron"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m9 5 7 7-7 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </label>

        <label class="category-card">
          <input type="radio" name="category" value="飲食費・会食" onchange="toggleInputs(); maybeAnalyzeReceipt();">
          <span class="radio-visual"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m5 12.5 4.2 4.2L19.5 6.5" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span class="category-icon meal"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 4v16M5 4v5a2 2 0 0 0 4 0V4M15 4v16M15 4c2.5.8 4 3 4 6v1h-4" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span class="category-title">飲食費・会食</span>
          <span class="chevron"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m9 5 7 7-7 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </label>

        <label class="category-card">
          <input type="radio" name="category" value="ガソリン" onchange="toggleInputs(); maybeAnalyzeReceipt();">
          <span class="radio-visual"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m5 12.5 4.2 4.2L19.5 6.5" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span class="category-icon fuel"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M6 20V5.8A1.8 1.8 0 0 1 7.8 4h6.4A1.8 1.8 0 0 1 16 5.8V20" stroke="currentColor" stroke-width="1.8"/><path d="M8 8h6v4H8z" fill="currentColor" opacity=".16" stroke="currentColor" stroke-width="1.4"/><path d="M16 8h1.2L20 10.8V17a1.5 1.5 0 0 1-3 0v-2" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/><path d="M5 20h12" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg></span>
          <span class="category-title">ガソリン</span>
          <span class="chevron"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m9 5 7 7-7 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </label>

        <label class="category-card">
          <input type="radio" name="category" value="その他経費" onchange="toggleInputs(); maybeAnalyzeReceipt();">
          <span class="radio-visual"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m5 12.5 4.2 4.2L19.5 6.5" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          <span class="category-icon other"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 4h10v16l-2-1.2-2 1.2-2-1.2-2 1.2-2-1.2V4Z" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><path d="M9.5 8h5M9.5 12h5M9.5 16h3" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg></span>
          <span class="category-title">その他経費</span>
          <span class="chevron"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m9 5 7 7-7 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
        </label>
      </div>

      <div id="mealPurposeArea">
        <div class="fieldTitle">会合・目的</div>
        <select id="mealPurpose" onchange="toggleMealMemo(); updateSendButton();">
          <option value="">選択してください</option>
          <option value="鯱の会">鯱の会</option>
          <option value="Passion Leaders">Passion Leaders</option>
          <option value="同友会">同友会</option>
          <option value="青経塾">青経塾</option>
          <option value="取引先">取引先</option>
          <option value="その他">その他</option>
        </select>
        <div class="hint">会合名または目的を選択してください。</div>
      </div>

      <div id="memoArea">
        <div id="memoTitle" class="fieldTitle">メモ</div>
        <textarea id="memo" placeholder=""></textarea>
        <div id="memoHint" class="hint"></div>
      </div>

      <label for="receiptImage" class="primary-action-button">
        <span><svg width="28" height="28" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M8 7.5 9.4 5h5.2L16 7.5h2.5A2.5 2.5 0 0 1 21 10v6.5a2.5 2.5 0 0 1-2.5 2.5h-13A2.5 2.5 0 0 1 3 16.5V10a2.5 2.5 0 0 1 2.5-2.5H8Z" stroke="currentColor" stroke-width="1.8"/><circle cx="12" cy="13" r="3.2" stroke="currentColor" stroke-width="1.8"/><path d="M18 6l.5-1 .5 1 1 .5-1 .5-.5 1-.5-1-1-.5 1-.5Z" fill="currentColor"/></svg></span>
        <span><span class="action-title">撮影して解析開始</span><span class="action-subtitle">カメラが起動します</span></span>
      </label>

      <input id="receiptImage" type="file" accept="image/*" capture="environment" onchange="showFileName(); maybeAnalyzeReceipt();">
      <div id="fileName" class="upload-status">○ 撮影待ち</div>

      <div class="security-card">
        <span class="security-icon"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 3.5 19 6v5.2c0 4.4-2.8 7.6-7 9.3-4.2-1.7-7-4.9-7-9.3V6l7-2.5Z" stroke="currentColor" stroke-width="1.8"/><path d="M9.5 12h5v4h-5z" fill="currentColor" opacity=".18" stroke="currentColor" stroke-width="1.4"/><path d="M10.5 12v-1a1.5 1.5 0 0 1 3 0v1" stroke="currentColor" stroke-width="1.4"/></svg></span>
        <span><span class="security-title">領収書データは安全に保護されます</span><span class="security-text">撮影後に内容を確認・修正してから登録できます。</span></span>
        <span class="chevron"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="m9 5 7 7-7 7" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      </div>

      <div id="loadingState" class="loading-state"><span class="spinner"></span><span>AI解析中...</span></div>

      <div id="confirmArea">
        <div class="confirmTitle">送信前確認</div>
        <div class="confirmGrid">
          <div class="confirmField"><label for="confirmDate">取引日</label><input id="confirmDate" type="date"></div>
          <div class="confirmField"><label for="confirmVendor">店舗名・取引先</label><input id="confirmVendor" type="text"></div>
          <div class="confirmField"><label for="confirmAmount">金額（税込）</label><input id="confirmAmount" type="number" inputmode="numeric"></div>
          <div class="confirmField"><label for="confirmInputCategory">選択した経費区分</label><input id="confirmInputCategory" type="text" readonly></div>
          <div class="confirmField"><label for="confirmCategory">Gemini判定カテゴリ</label><input id="confirmCategory" type="text"></div>
          <div class="confirmField"><label for="confirmPaymentMethod">支払方法</label><select id="confirmPaymentMethod"><option value="現金">現金</option><option value="現金">現金</option><option value="クレジット">クレジット</option><option value="電子マネー">電子マネー</option><option value="QR決済">QR決済</option><option value="不明">不明</option></select></div>
          <div class="confirmField"><label for="confirmInvoiceNumber">登録番号</label><input id="confirmInvoiceNumber" type="text" placeholder="T1234567890123" oninput="normalizeInvoiceInput(false)"></div>
          <div class="confirmField"><label for="confirmInvoiceJudgement">インボイス判定</label><input id="confirmInvoiceJudgement" type="text"></div>
          <div class="confirmField"><label for="confirmTaxRate">税率</label><input id="confirmTaxRate" type="text"></div>
          <div class="confirmField"><label for="confirmTaxAmount">消費税額</label><input id="confirmTaxAmount" type="number" inputmode="numeric"></div>
          <div class="confirmField"><label for="confirmTaxNote">税率・消費税メモ</label><textarea id="confirmTaxNote"></textarea></div>
        </div>
        <div class="saveNotice">内容を確認・修正してから送信してください。送信ボタンを押すまでデータ保存と登録は行いません。</div>
        <button id="submitButton" class="submitButton" onclick="submitConfirmedReceipt()">送信</button>
      </div>

      <div id="result"></div>
    </main>

    <section class="features-section" aria-label="このサービスの特徴">
      <div class="features-heading">このサービスの特徴</div>
      <div class="features-grid">
        <div class="feature-card"><div class="feature-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M9 5a3 3 0 0 0-3 3 3 3 0 0 0-2 2.8A3.2 3.2 0 0 0 7.2 14H9V5Zm6 0a3 3 0 0 1 3 3 3 3 0 0 1 2 2.8A3.2 3.2 0 0 1 16.8 14H15V5ZM9 14v2a3 3 0 0 0 6 0v-2" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></div><div class="feature-title">AI自動解析</div><div class="feature-text">Gemini AIが領収書を高精度で解析</div></div>
        <div class="feature-card"><div class="feature-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 18h10.5a3.5 3.5 0 0 0 .4-7A6 6 0 0 0 6.4 9.8 4.1 4.1 0 0 0 7 18Z" fill="currentColor" opacity=".18" stroke="currentColor" stroke-width="1.7"/><path d="m10 14 1.5 1.5L15 12" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/></svg></div><div class="feature-title">クラウド連携</div><div class="feature-text">データを安全に一元管理</div></div>
        <div class="feature-card"><div class="feature-icon"><svg width="26" height="26" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 4h7l3 3v13H7V4Z" fill="currentColor" opacity=".14" stroke="currentColor" stroke-width="1.7"/><path d="M14 4v4h4M9.5 12h5M9.5 15.5h5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg></div><div class="feature-title">電子帳簿保存法対応</div><div class="feature-text">法令に準拠した安心の運用</div></div>
      </div>
    </section>
  </div>

  <nav class="bottom-nav" aria-label="下部ナビゲーション">
    <div class="nav-item"><span class="nav-icon"><svg width="25" height="25" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M7 5h10v14H7z" stroke="currentColor" stroke-width="1.9"/><path d="M9.5 9h5M9.5 12h5M9.5 15h3" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/></svg></span><span>履歴一覧</span></div>
    <div class="nav-item is-active"><span class="nav-icon"><svg width="25" height="25" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M4 10.5 12 4l8 6.5V20a1 1 0 0 1-1 1h-5v-6h-4v6H5a1 1 0 0 1-1-1v-9.5Z"/></svg></span><span>ホーム</span></div>
    <div class="nav-item"><span class="nav-icon"><svg width="25" height="25" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M12 15.2a3.2 3.2 0 1 0 0-6.4 3.2 3.2 0 0 0 0 6.4Z" stroke="currentColor" stroke-width="1.8"/><path d="M19 13.5v-3l-2-.5a6 6 0 0 0-.7-1.6l1.1-1.8-2.1-2.1-1.8 1.1A6 6 0 0 0 12 5l-.5-2h-3l-.5 2a6 6 0 0 0-1.6.7L4.6 4.6 2.5 6.7l1.1 1.8A6 6 0 0 0 3 10l-2 .5v3l2 .5a6 6 0 0 0 .7 1.6l-1.1 1.8 2.1 2.1 1.8-1.1A6 6 0 0 0 8 19l.5 2h3l.5-2a6 6 0 0 0 1.6-.7l1.8 1.1 2.1-2.1-1.1-1.8A6 6 0 0 0 17 14l2-.5Z" stroke="currentColor" stroke-width="1.4" stroke-linejoin="round"/></svg></span><span>設定</span></div>
  </nav>

  <script>
    function getSelectedCategory() {
      const selected = document.querySelector('input[name="category"]:checked');
      return selected ? selected.value : '';
    }

    function updateCaptureStatus(state, text) {
      const fileName = document.getElementById('fileName');
      fileName.className = 'upload-status';
      if (state) fileName.classList.add(state);
      fileName.textContent = text;
    }

    function toggleInputs() {
      const category = getSelectedCategory();

      const mealPurposeArea = document.getElementById('mealPurposeArea');
      const mealPurpose = document.getElementById('mealPurpose');
      const memoArea = document.getElementById('memoArea');
      const memo = document.getElementById('memo');
      const memoTitle = document.getElementById('memoTitle');
      const memoHint = document.getElementById('memoHint');

      document.querySelectorAll('.category-card').forEach(function(card) {
        const input = card.querySelector('input[name="category"]');
        card.classList.toggle('is-selected', Boolean(input && input.checked));
      });

      mealPurposeArea.style.display = 'none';
      memoArea.style.display = 'none';

      mealPurpose.value = '';
      memo.value = '';
      memoTitle.textContent = 'メモ';
      memo.placeholder = '';
      memoHint.textContent = '';

      if (category === '飲食費・会食') {
        mealPurposeArea.style.display = 'block';
      }

      if (category === 'その他経費') {
        memoArea.style.display = 'block';
        memoTitle.textContent = '購入内容';
        memo.placeholder = '例：USBハブ、LANケーブル、マウス、パソコン備品';
        memoHint.textContent = '購入内容が分かるように入力してください。';
      }

      updateSendButton();
    }

    function toggleMealMemo() {
      const purpose = document.getElementById('mealPurpose').value;
      const memoArea = document.getElementById('memoArea');
      const memo = document.getElementById('memo');
      const memoTitle = document.getElementById('memoTitle');
      const memoHint = document.getElementById('memoHint');

      memoArea.style.display = 'none';
      memo.value = '';
      memoTitle.textContent = 'メモ';
      memo.placeholder = '';
      memoHint.textContent = '';

      if (purpose === '取引先') {
        memoArea.style.display = 'block';
        memoTitle.textContent = '取引先名';
        memo.placeholder = '例：株式会社〇〇 山田社長';
        memoHint.textContent = '取引先名・相手の名前などを入力してください。';
      }

      if (purpose === 'その他') {
        memoArea.style.display = 'block';
        memoTitle.textContent = '内容';
        memo.placeholder = '例：会合名、相手先、目的など';
        memoHint.textContent = '内容が分かるように入力してください。';
      }

      updateSendButton();
    }

    function showFileName() {
      const fileInput = document.getElementById('receiptImage');
      updateCaptureStatus(
        fileInput.files.length ? 'is-captured' : '',
        fileInput.files.length ? '✓ 撮影完了：' + fileInput.files[0].name : '○ 撮影待ち'
      );
      document.getElementById('result').textContent = '';
      document.getElementById('confirmArea').style.display = 'none';
      lastAnalysisKey = '';
      document.getElementById('submitButton').disabled = true;

      updateSendButton();
    }

    function updateSendButton() {
      const category = getSelectedCategory();
      const imageSelected = document.getElementById('receiptImage').files.length > 0;
      const mealPurpose = document.getElementById('mealPurpose').value;
      const memo = document.getElementById('memo').value.trim();

      let ok = false;

      if (category === '駐車場・交通費' || category === 'ガソリン') {
        ok = category && imageSelected;
      }

      if (category === '飲食費・会食') {
        if (mealPurpose === '取引先' || mealPurpose === 'その他') {
          ok = imageSelected && mealPurpose && memo;
        } else {
          ok = imageSelected && mealPurpose;
        }
      }

      if (category === 'その他経費') {
        ok = imageSelected && memo;
      }

      maybeAnalyzeReceipt();
    }

    document.getElementById('memo').addEventListener('input', updateSendButton);

    function buildMemoText(category) {
      const mealPurpose = document.getElementById('mealPurpose').value;
      const memo = document.getElementById('memo').value.trim();

      if (category === '飲食費・会食') {
        if (mealPurpose === '取引先') return '取引先：' + memo;
        if (mealPurpose === 'その他') return 'その他：' + memo;
        return mealPurpose;
      }

      if (category === 'その他経費') return memo;

      return '';
    }

    function setAnalysisResult(res) {
      document.getElementById('confirmDate').value = res.date || '';
      document.getElementById('confirmVendor').value = res.vendor || '';
      document.getElementById('confirmAmount').value = res.amount || '';
      document.getElementById('confirmInputCategory').value = res.inputCategory || getSelectedCategory();
      document.getElementById('confirmCategory').value = res.category || '';
      document.getElementById('confirmPaymentMethod').value = res.paymentMethod || '現金';
      document.getElementById('confirmInvoiceNumber').value = normalizeInvoiceNumber(res.invoiceNumber || '');
      document.getElementById('confirmInvoiceJudgement').value = res.invoiceJudgement || '';
      document.getElementById('confirmTaxRate').value = res.taxRate || '';
      document.getElementById('confirmTaxAmount').value = res.taxAmount || '';
      document.getElementById('confirmTaxNote').value = res.taxNote || res.invoiceNote || '';
      document.getElementById('confirmArea').style.display = 'block';
      document.getElementById('submitButton').disabled = false;
    }

    function getConfirmedValues() {
      return {
        date: document.getElementById('confirmDate').value,
        vendor: document.getElementById('confirmVendor').value.trim(),
        amount: document.getElementById('confirmAmount').value,
        category: document.getElementById('confirmCategory').value.trim(),
        paymentMethod: document.getElementById('confirmPaymentMethod').value,
        invoiceNumber: normalizeInvoiceNumber(document.getElementById('confirmInvoiceNumber').value),
        invoiceJudgement: document.getElementById('confirmInvoiceJudgement').value.trim(),
        taxRate: document.getElementById('confirmTaxRate').value.trim(),
        taxAmount: document.getElementById('confirmTaxAmount').value,
        taxNote: document.getElementById('confirmTaxNote').value.trim()
      };
    }

    function validateConfirmedValues(values) {
      if (!values.date) return '取引日を入力してください。';
      if (!values.vendor) return '店舗名・取引先を入力してください。';
      if (!values.amount) return '金額を入力してください。';
      const invoiceValidationMessage = validateInvoiceNumber(values.invoiceNumber);
      if (invoiceValidationMessage) return invoiceValidationMessage;
      return '';
    }

    function normalizeInvoiceNumber(value) {
      if (!value) return '';

      const text = String(value)
        .replace(/[Ｔｔ]/g, 'T')
        .replace(/[０-９]/g, function(s) {
          return String.fromCharCode(s.charCodeAt(0) - 0xFEE0);
        })
        .replace(/[^Tt0-9]/g, '')
        .toUpperCase();

      if (/^\d{13}$/.test(text)) return 'T' + text;
      return text;
    }

    function validateInvoiceNumber(value) {
      if (!value) return '';
      return /^T\d{13}$/.test(value)
        ? ''
        : '登録番号は「T」+ 数字13桁（または数字13桁）で入力してください。';
    }

    function normalizeInvoiceInput(showError) {
      const input = document.getElementById('confirmInvoiceNumber');
      const normalized = normalizeInvoiceNumber(input.value);
      input.value = normalized;

      if (showError) {
        const message = validateInvoiceNumber(normalized);
        if (message) document.getElementById('result').textContent = message;
      }

      return normalized;
    }

    function submitConfirmedReceipt() {
      const category = getSelectedCategory();
      const fileInput = document.getElementById('receiptImage');
      const result = document.getElementById('result');
      const submitButton = document.getElementById('submitButton');
      normalizeInvoiceInput(false);
      const values = getConfirmedValues();
      const validationMessage = validateConfirmedValues(values);

      if (validationMessage) {
        result.textContent = validationMessage;
        return;
      }

      if (!category || !fileInput.files.length) {
        result.textContent = '経費区分と領収書画像を確認してください。';
        return;
      }

      const file = fileInput.files[0];
      const reader = new FileReader();

      submitButton.disabled = true;
      result.textContent = 'データ保存と登録を実行中です。しばらくお待ちください...';

      reader.onload = function(e) {
        const base64 = e.target.result.split(',')[1];

        google.script.run
          .withSuccessHandler(function(res) {
            if (res.success) {
              result.textContent = res.message || '登録が完了しました。';
              document.getElementById('confirmArea').style.display = 'none';
              document.getElementById('receiptImage').value = '';
              updateCaptureStatus('', '○ 撮影待ち');
              updateSendButton();
            } else {
              submitButton.disabled = false;
              result.textContent = '登録に失敗しました。\n\n' + res.message;
            }
          })
          .withFailureHandler(function(err) {
            submitButton.disabled = false;
            updateCaptureStatus('is-captured', '✓ 撮影完了：再解析できます');
            result.textContent = 'エラー：' + err.message;
          })
          .submitConfirmedReceiptFromWebApp({
            categoryInput: category,
            memo: buildMemoText(category),
            imageBase64: base64,
            mimeType: file.type,
            confirmed: values
          });
      };

      reader.readAsDataURL(file);
    }

    let analysisInProgress = false;
    let lastAnalysisKey = '';

    function maybeAnalyzeReceipt() {
      const category = getSelectedCategory();
      const fileInput = document.getElementById('receiptImage');

      if (!category || !fileInput.files.length || analysisInProgress) return;

      const file = fileInput.files[0];
      const analysisKey = [category, file.name, file.size, file.lastModified].join('|');
      if (analysisKey === lastAnalysisKey) return;

      analyzeReceipt(analysisKey);
    }

    function analyzeReceipt(analysisKey) {
      const category = getSelectedCategory();
      const fileInput = document.getElementById('receiptImage');
      const result = document.getElementById('result');

      if (!category) return;

      if (!fileInput.files.length) return;

      const file = fileInput.files[0];
      const reader = new FileReader();

      analysisInProgress = true;
      document.getElementById('confirmArea').style.display = 'none';
      document.getElementById('submitButton').disabled = true;
      result.textContent = 'Geminiで解析中です。しばらくお待ちください...';
      updateCaptureStatus('is-analyzing', 'AI解析中...');
      document.getElementById('loadingState').classList.add('is-active');

      reader.onload = function(e) {
        const base64 = e.target.result.split(',')[1];

        google.script.run
          .withSuccessHandler(function(res) {
            analysisInProgress = false;
            document.getElementById('loadingState').classList.remove('is-active');

            if (res.success) {
              lastAnalysisKey = analysisKey || '';
              setAnalysisResult(res);
              updateCaptureStatus('is-analyzed', 'AI解析完了：内容を確認してください');
              result.textContent = '解析結果を確認し、必要に応じて編集してください。まだ保存はされていません。';
            } else {
              updateCaptureStatus('is-captured', '✓ 撮影完了：再解析できます');
              result.textContent = '読取に失敗しました。\n\n' + res.message;
            }
          })
          .withFailureHandler(function(err) {
            analysisInProgress = false;
            document.getElementById('loadingState').classList.remove('is-active');
            updateCaptureStatus('is-captured', '✓ 撮影完了：再解析できます');
            result.textContent = 'エラー：' + err.message;
          })
          .analyzeReceiptFromWebApp({
            categoryInput: category,
            imageBase64: base64,
            mimeType: file.type
          });
      };

      reader.readAsDataURL(file);
    }
  </script>
